*{box-sizing:border-box}
body{margin:0;background:#101116;color:#e9e7df;font-family:'Onest',system-ui,sans-serif;padding:32px 18px 70px}
.head{max-width:1200px;margin:0 auto 22px}
.head h1{font-family:'Playfair Display',serif;font-weight:500;font-size:23px;margin:0 0 6px}
.head p{margin:0;font-size:13px;color:#9c9c98;line-height:1.6;max-width:760px}
.grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:30px;justify-items:center}

.stage{width:360px;height:540px;perspective:1600px}
.flip{position:relative;width:100%;height:100%;transition:transform .8s cubic-bezier(.4,.05,.2,1);transform-style:preserve-3d;cursor:pointer}
.flip.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:24px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  transition:opacity 0s linear .4s;color:#f2efe5;box-shadow:0 36px 80px -38px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.05)}
.front{opacity:1}.back{opacity:0;transform:rotateY(180deg)}
.flip.flipped .front{opacity:0}.flip.flipped .back{opacity:1}
@media(prefers-reduced-motion:reduce){.flip,.face{transition:none}}

.scene{position:absolute;inset:0;width:100%;height:100%;display:block}
.fl-frame{position:absolute;inset:14px;border:1px solid rgba(236,231,216,.22);border-radius:14px;pointer-events:none}
.kicker{position:absolute;top:28px;left:0;right:0;text-align:center;font-size:10px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:rgba(238,233,219,.72)}
.collector{position:absolute;top:25px;right:28px;display:flex;align-items:center;gap:6px;font-family:'Playfair Display',serif;font-size:13px;color:rgba(238,233,219,.6)}
.collector svg{width:13px;height:13px}
.plate{position:absolute;left:0;right:0;bottom:0;padding:0 28px 28px}
.hr{width:32px;height:1px;background:linear-gradient(90deg,#d9c08a,rgba(217,192,138,0));margin-bottom:13px}
.f-name{font-family:'Playfair Display',serif;font-weight:500;font-size:31px;line-height:1.02;color:#f5f0e6;margin:0}
.f-sans{font-size:10px;font-weight:500;letter-spacing:.24em;text-transform:uppercase;color:rgba(202,206,224,.72);margin-top:6px}
.poem{font-family:'Playfair Display',serif;font-style:italic;font-size:14px;line-height:1.5;color:rgba(228,228,240,.9);margin:11px 0 0;max-width:270px}
.meta{margin-top:12px;font-size:10.5px;color:rgba(202,206,224,.72);letter-spacing:.02em}

.back{--accent:#9b8cff;--chip:rgba(238,233,219,.26);--hair:rgba(238,233,219,.15);--dim:#a7adc4}
.bk-frame{position:absolute;inset:14px;border:1px solid rgba(236,231,216,.20);border-radius:16px;pointer-events:none}
.inner{position:absolute;inset:14px;padding:18px 20px;display:flex;flex-direction:column;gap:11px}

.qrtop{display:flex;align-items:center;justify-content:center;gap:11px}
.qrbadge{width:38px;height:38px;border-radius:50%;border:1px solid var(--chip);display:grid;place-items:center;color:var(--accent);box-shadow:0 0 22px -7px var(--accent);flex:none}
.qrbadge svg{width:19px;height:19px}
.qrtop .t{font-size:11px;color:#e7e4f3;line-height:1.3}
.qrtop .t b{font-weight:600}.qrtop .t span{color:var(--dim)}

.eyebrow{font-size:9px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--dim)}
.breath{display:flex;flex-direction:column;gap:7px}
.bar{display:flex;gap:5px;height:13px}
.seg{border-radius:7px;opacity:.92}
.barlab{display:flex;font-size:11px;color:var(--dim)}.barlab>div{text-align:center}
.tech{display:flex;align-items:center;justify-content:center;gap:7px;font-size:11.5px;color:#dcdbe8;font-style:italic;font-family:'Playfair Display',serif}

.picts{display:flex;justify-content:center;gap:24px}
.pict{display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10px;color:var(--dim)}
.ic{width:34px;height:34px;border-radius:50%;border:1px solid var(--chip);display:grid;place-items:center;color:#ece9df}
.ic svg{width:17px;height:17px}

.divdot{display:flex;align-items:center;gap:9px}
.divdot::before,.divdot::after{content:"";height:1px;background:var(--hair);flex:1}
.divdot span{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:.7}

.cols{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;flex:1;align-content:start}
.col .ch{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.it{display:flex;align-items:center;gap:9px;font-size:12px;color:#eae8df;margin-bottom:9px;line-height:1.15}
.it .dotic{width:26px;height:26px;border-radius:50%;border:1px solid var(--chip);display:grid;place-items:center;color:var(--accent);flex:none}
.it .dotic svg{width:14px;height:14px}

.foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-top:11px;border-top:1px solid var(--hair)}
.contra{font-size:10px;color:var(--dim);line-height:1.45;display:flex;gap:7px;align-items:flex-start}
.contra .cic{color:#e0a24e;flex:none;margin-top:1px}.contra .cic svg{width:14px;height:14px}
.qrbox{width:50px;height:50px;border-radius:13px;background:#f2efe5;display:grid;place-items:center;flex:none}

@media print{body{background:#fff;padding:0}.head{display:none}.grid{gap:8mm}.face{box-shadow:none}}
</style>
</head>

function luminary(f,id){
  const cx=266,cy=132;
  let extra='';
  if(f.lum==='sun'){let ray='';for(let i=0;i<12;i++){const a=i*30*Math.PI/180;ray+=`<line x1="${cx+Math.cos(a)*60}" y1="${cy+Math.sin(a)*60}" x2="${cx+Math.cos(a)*72}" y2="${cy+Math.sin(a)*72}" stroke="${f.glow}" stroke-opacity=".5" stroke-width="2" stroke-linecap="round"/>`;}extra=ray;}
  else if(f.lum==='moon'){extra=`<g fill="${f.d2}" opacity=".35"><circle cx="250" cy="116" r="7"/><circle cx="282" cy="146" r="9"/><circle cx="272" cy="110" r="4"/></g>`;}
  return `<circle cx="${cx}" cy="${cy}" r="96" fill="url(#halo-${id})" filter="url(#soft-${id})"/>${extra}<circle cx="${cx}" cy="${cy}" r="52" fill="url(#disc-${id})"/><circle cx="${cx}" cy="${cy}" r="52" fill="none" stroke="#fffdf6" stroke-opacity=".22"/>`;
}
function chakras(c){
  let dots='',line='';const pts=c.ch.map(i=>FANCH[i]);
  if(pts.length>1){line=`<polyline points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="#9fb0d8" stroke-opacity=".3" stroke-width="1"/>`;}
  c.ch.forEach(i=>{const[x,y]=FANCH[i],col=CHC[i];dots+=`<circle cx="${x}" cy="${y}" r="9" fill="${col}" opacity=".14"/><circle cx="${x}" cy="${y}" r="3.6" fill="${col}"/><circle cx="${x}" cy="${y}" r="1.3" fill="#fff"/>`;});
  return line+dots;
}
function buildFront(c){
  const f=FAM[c.fam],id=c.n;
  const scene=`<svg class="scene" viewBox="0 0 360 540" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <linearGradient id="sky-${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${f.sky1}"/><stop offset="1" stop-color="${f.sky2}"/></linearGradient>
      <radialGradient id="halo-${id}" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="${f.glow}" stop-opacity=".5"/><stop offset="1" stop-color="${f.glow}" stop-opacity="0"/></radialGradient>
      <radialGradient id="disc-${id}" cx="40%" cy="38%" r="70%"><stop offset="0" stop-color="${f.d1}"/><stop offset=".6" stop-color="${f.d1}"/><stop offset="1" stop-color="${f.d2}"/></radialGradient>
      <linearGradient id="br-${id}" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${f.stream}" stop-opacity=".05"/><stop offset=".5" stop-color="${f.stream}" stop-opacity=".8"/><stop offset="1" stop-color="${f.stream}" stop-opacity=".12"/></linearGradient>
      <linearGradient id="scrim-${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${f.sky2}" stop-opacity="0"/><stop offset="1" stop-color="${f.sky2}" stop-opacity=".94"/></linearGradient>
      <filter id="soft-${id}" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
    </defs>
    <rect width="360" height="540" fill="url(#sky-${id})"/>
    <g fill="#eef2ff" id="st-${id}"></g>
    ${luminary(f,id)}
    <g fill="none" stroke="url(#br-${id})" stroke-linecap="round">
      <path d="M150,322 C190,306 224,262 250,186" stroke-width="2"/>
      <path d="M152,330 C196,320 228,284 252,206" stroke-width="1.3" opacity=".8"/>
      <path d="M150,338 C192,338 226,308 248,228" stroke-width="1" opacity=".55"/></g>
    <ellipse cx="92" cy="270" rx="16" ry="16" fill="${f.fig}"/>
    <path d="M92,250 C114,248 130,266 130,290 C130,302 138,304 138,311 C138,317 130,318 127,322 C123,336 113,344 100,346 C112,352 116,360 116,366 C140,372 156,400 158,440 C158,470 150,520 150,560 L40,560 C40,470 50,398 76,366 C86,356 92,350 96,346 C82,342 74,318 76,292 C78,268 80,252 92,250 Z" fill="${f.fig}"/>
    ${chakras(c)}
    <rect x="0" y="300" width="360" height="240" fill="url(#scrim-${id})"/>
  </svg>`;
  return `<div class="face front">${scene}
    <div class="fl-frame"></div>
    <div class="kicker">${c.vals.join(' · ')}</div>
    <div class="collector">${svg(f.lum==='sun'?'sun':'moon')} ${c.n} / 12</div>
    <div class="plate"><div class="hr"></div>
      <h1 class="f-name">${c.name}</h1>
      <div class="f-sans">${c.sans}</div>
      <p class="poem">${c.poem}</p>
      <div class="meta">${c.meta} · ${c.when} · ${c.dur} мин</div>
    </div></div>`;
}
function buildBack(c){
  const f=FAM[c.fam];
  const bar = c.br.rapid
    ? `<div class="bar">${Array.from({length:9}).map((_,i)=>`<div class="seg" style="flex:1;background:${i%2?HO:IN};opacity:${.55+(i%2?0:.3)}"></div>`).join('')}</div>
       <div class="barlab"><div style="flex:1">серия резких выдохов</div></div>`
    : `<div class="bar">${c.br.ph.map(p=>`<div class="seg" style="flex:${p[1]};background:${p[2]}"></div>`).join('')}</div>
       <div class="barlab">${c.br.ph.map(p=>`<div style="flex:${p[1]}">${p[0]}</div>`).join('')}</div>`;
  const picts=c.pic.map(p=>`<div class="pict"><div class="ic">${svg(p[0])}</div>${p[1]}</div>`).join('');
  const mind=c.mind.map(e=>`<div class="it"><span class="dotic">${svg(e[0])}</span>${e[1]}</div>`).join('');
  const body=c.body.map(e=>`<div class="it"><span class="dotic">${svg(e[0])}</span>${e[1]}</div>`).join('');
  return `<div class="face back" style="background:radial-gradient(130% 90% at 50% -10%,${f.sky1},${f.sky2} 72%);--accent:${f.accent}">
    <div class="bk-frame"></div>
    <div class="inner">
      <div class="qrtop"><div class="qrbadge">${svg('scan')}</div><div class="t"><b>полная техника</b><br><span>сканируйте QR</span></div></div>
      <div class="breath"><div class="eyebrow">дыхание · ${c.br.r}</div>${bar}<div class="tech">${c.tech}</div></div>
      <div class="picts">${picts}</div>
      <div class="divdot"><span></span></div>
      <div class="cols">
        <div class="col"><div class="ch">Для ума и энергии</div>${mind}</div>
        <div class="col"><div class="ch">Для тела</div>${body}</div>
      </div>
      <div class="foot">
        <div class="contra"><span class="cic">${svg('alert')}</span><span>${c.rx}</span></div>
        <div class="qrbox">${qrMini()}</div>
      </div>
    </div></div>`;
}

const grid=document.getElementById('grid');
grid.innerHTML=CARDS.map(c=>`<div class="stage"><div class="flip" data-flip>${buildFront(c)}${buildBack(c)}</div></div>`).join('');

// звёзды для каждого лица
let seed=7;const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
document.querySelectorAll('[id^="st-"]').forEach(g=>{let h='';for(let i=0;i<60;i++){h+=`<circle cx="${(rnd()*360).toFixed(1)}" cy="${(rnd()*410).toFixed(1)}" r="${(rnd()*1.1+.3).toFixed(2)}" opacity="${(rnd()*.6+.2).toFixed(2)}"/>`;}g.innerHTML=h;});

document.querySelectorAll('[data-flip]').forEach(el=>el.addEventListener('click',()=>el.classList.toggle('flipped')));
</script>
